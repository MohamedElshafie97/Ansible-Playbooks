---
- name: Enterprise SSH Hardening
  hosts: all
  become: yes
  vars:
    # Define variables for easy customization
    ssh_port: "22"
    allow_users: "sysadmin" # Replace with your actual admin user
    permit_root_login: "no"
    password_authentication: "no"

  tasks:
    - name: Ensure SSH is installed
      package:
        name: "{{ 'openssh-server' if ansible_os_family == 'Debian' else 'openssh-server' }}"
        state: present

    - name: Backup original SSH configuration
      copy:
        src: /etc/ssh/sshd_config
        dest: /etc/ssh/sshd_config.bak
        remote_src: yes
        force: no

    - name: Apply SSH Hardening Security Settings
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
        validate: '/usr/sbin/sshd -t -f %s'
      loop:
        - { regexp: '^Port', line: "Port {{ ssh_port }}" }
        - { regexp: '^PermitRootLogin', line: "PermitRootLogin {{ permit_root_login }}" }
        - { regexp: '^PasswordAuthentication', line: "PasswordAuthentication {{ password_authentication }}" }
        - { regexp: '^PubkeyAuthentication', line: "PubkeyAuthentication yes" }
        - { regexp: '^X11Forwarding', line: "X11Forwarding no" }
        - { regexp: '^MaxAuthTries', line: "MaxAuthTries 3" }
        - { regexp: '^AllowUsers', line: "AllowUsers {{ allow_users }}" }
      notify: Restart SSH

    - name: Configure Firewall for SSH (UFW - Debian)
      ufw:
        rule: allow
        port: "{{ ssh_port }}"
        proto: tcp
      when: ansible_os_family == "Debian"

    - name: Configure Firewall for SSH (Firewalld - RedHat)
      firewalld:
        port: "{{ ssh_port }}/tcp"
        permanent: yes
        state: enabled
      when: ansible_os_family == "RedHat"

  handlers:
    - name: Restart SSH
      service:
        name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"
        state: restarted